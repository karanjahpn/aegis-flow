name: AEGIS-FLOW CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------ #
  # Python: Lint + Test
  # ------------------------------------------------------------------ #
  python-ci:
    name: Python ${{ matrix.python-version }} — Lint & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          # Fail on syntax errors or undefined names
          flake8 core/ enclave/ blockchain/ main.py \
            --count --select=E9,F63,F7,F82 --show-source --statistics
          # Style warnings (non-blocking)
          flake8 core/ enclave/ blockchain/ main.py \
            --count --max-line-length=100 --statistics || true

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=core --cov=enclave \
            --cov-report=term-missing \
            --cov-report=xml \
            --tb=short

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ------------------------------------------------------------------ #
  # Solidity: Compile Smart Contract
  # ------------------------------------------------------------------ #
  solidity-ci:
    name: Solidity — Compile AegisRegistry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Hardhat
        run: npm install

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run Hardhat tests (if present)
        run: npx hardhat test || echo "No Hardhat tests yet"

  # ------------------------------------------------------------------ #
  # Security: Basic secret scanning
  # ------------------------------------------------------------------ #
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect hardcoded secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

